<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form</title>
</head>
<body>

  <h2>Contact Form</h2>

  <form>

    <label for="name">Name:</label><br>
    <input type="text" id="name" name="name" placeholder="Enter your name"><br><br>

    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email" placeholder="Enter your email"><br><br>

    <label for="number">Phone Number:</label><br>
    <input type="tel" id="number" name="number" placeholder="Enter your phone number"><br><br>

    <label for="password">Password:</label><br>
    <input type="password" id="password" name="password" placeholder="Enter your password"><br><br>

    <label for="age">Age:</label><br>
    <select id="age" name="age">
      <option value="">-- Select Age --</option>
      <option value="under_18">Under 18</option>
      <option value="18_24">18 - 24</option>
      <option value="25_34">25 - 34</option>
      <option value="35_44">35 - 44</option>
      <option value="45_54">45 - 54</option>
      <option value="55_64">55 - 64</option>
      <option value="65_plus">65+</option>
    </select><br><br>

    <label for="country">Country:</label><br>
    <select id="country" name="country">
      <option value="">-- Select Country --</option>
      <option value="india">India</option>
      <option value="pakistan">Pakistan</option>
      <option value="usa">United States</option>
      <option value="uk">United Kingdom</option>
      <option value="canada">Canada</option>
      <option value="australia">Australia</option>
      <option value="germany">Germany</option>
      <option value="france">France</option>
      <option value="uae">UAE</option>
      <option value="china">China</option>
    </select><br><br>

    <label>Favourite Colour:</label><br>
    <input type="radio" id="red" name="fav_colour" value="red">
    <label for="red">Red</label>
    <input type="radio" id="blue" name="fav_colour" value="blue">
    <label for="blue">Blue</label>
    <input type="radio" id="green" name="fav_colour" value="green">
    <label for="green">Green</label>
    <input type="radio" id="yellow" name="fav_colour" value="yellow">
    <label for="yellow">Yellow</label>
    <input type="radio" id="purple" name="fav_colour" value="purple">
    <label for="purple">Purple</label><br><br>

    <label>Hobby:</label><br>
    <input type="checkbox" id="reading" name="hobby" value="reading">
    <label for="reading">Reading</label>
    <input type="checkbox" id="gaming" name="hobby" value="gaming">
    <label for="gaming">Gaming</label>
    <input type="checkbox" id="cooking" name="hobby" value="cooking">
    <label for="cooking">Cooking</label>
    <input type="checkbox" id="travelling" name="hobby" value="travelling">
    <label for="travelling">Travelling</label>
    <input type="checkbox" id="sports" name="hobby" value="sports">
    <label for="sports">Sports</label><br><br>

    <label for="message">Message:</label><br>
    <textarea id="message" name="message" rows="5" cols="40" placeholder="Enter your message"></textarea><br><br>

    <button type="submit" style="background-color: red; color: white; padding: 8px 20px;">Submit</button>
    &nbsp;
    <button type="reset" style="background-color: blue; color: white; padding: 8px 20px;">Reset</button>

  </form>

</body>
</html>
